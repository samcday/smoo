name: vm-image

on:
  push:
    branches: [main, test-infra]
    paths:
      - .github/workflows/vm-image.yml
      - tools/vm-image/**
      - xtask/src/vm.rs
  pull_request:
    paths:
      - .github/workflows/vm-image.yml
      - tools/vm-image/**
      - xtask/src/vm.rs
  workflow_dispatch:

concurrency:
  group: vm-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: oras-project/setup-oras@v1

      - name: Resolve VM image ref
        id: vm-image
        run: |
          ref="$(cargo xtask vm-image ref)"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "tag=${ref##*:}" >> "$GITHUB_OUTPUT"
          echo "VM image ref: $ref"

      - name: Install VM host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils openssh-client curl

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Fedora base image
        uses: actions/cache@v4
        with:
          path: target/vm-images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
          key: fedora-cloud-base-generic-43-1.6-x86_64-846574c8

      - name: Build baked VM image
        run: cargo xtask vm-image build

      - name: Validate baked VM image
        run: cargo xtask vm-integration

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoo-integration-vm-${{ steps.vm-image.outputs.tag }}
          path: |
            target/vm-images/smoo-integration-vm.qcow2
            target/vm-images/smoo-integration-vm.qcow2.sha256
            target/vm-images/smoo-integration-vm.manifest.json
          retention-days: 14

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'test-infra')
        run: echo '${{ secrets.GITHUB_TOKEN }}' | oras login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Push image to GHCR
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'test-infra')
        working-directory: target/vm-images
        run: |
          oras push '${{ steps.vm-image.outputs.ref }}' \
            --artifact-type application/vnd.smoo.integration-vm \
            smoo-integration-vm.qcow2:application/x-qemu-disk \
            smoo-integration-vm.qcow2.sha256:text/plain \
            smoo-integration-vm.manifest.json:application/json

      - if: failure()
        name: Upload VM run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-image-run-artifacts-${{ github.run_id }}
          path: target/vm-runs/**
          retention-days: 14
