name: integration-tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  vm-integration:
    # The smoo integration harness needs dummy_hcd / ublk / usbmon. Public
    # GitHub-hosted runners do not expose those modules on the runner kernel,
    # so this job builds the harness on the host and runs it inside a
    # disposable Fedora guest booted with QEMU/KVM.
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install VM host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils openssh-client curl pkg-config libusb-1.0-0-dev libclang-dev

      - uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo '${{ secrets.GITHUB_TOKEN }}' | oras login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download baked VM image
        run: cargo xtask vm-image download

      - name: Run VM integration harness
        run: cargo xtask vm-integration

      - if: failure()
        name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: vm-integration-artifacts-${{ github.run_id }}
          path: target/vm-runs/**
          retention-days: 14
